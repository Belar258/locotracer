<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>RailView</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

#map{
flex:1;
}

#panel{
width:300px;
background:#f4f4f4;
padding:15px;
border-left:1px solid #ccc;
}

button{
padding:8px;
margin-top:10px;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="panel">

<h2>RailView</h2>

<div id="trainInfo">

Selecione um comboio

</div>

<button onclick="toggleRoute()">Mostrar / esconder rota</button>

</div>

<script>

var firebaseConfig={
 apiKey: "AIzaSyDQ9cMPQOG3TBU-9cB3MH0L4POWp45-Ff4",
  authDomain: "locotracer.firebaseapp.com",
  databaseURL: "https://locotracer-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "locotracer",
  storageBucket: "locotracer.firebasestorage.app",
  messagingSenderId: "364605919766",
  appId: "1:364605919766:web:c50f21644bf289fa29db37",
  measurementId: "G-W0XJFNLHK8"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.database();

var map=L.map("map").setView([-25.9,32.5],12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers={};

let selectedTrain=null;

let showRoute=false;

let routePoints=[];

let routeLine=null;

function getColor(status){

if(status=="moving") return "green";
if(status=="stopped") return "yellow";
if(status=="derailment") return "red";

return "gray";

}

function updatePanel(data){

let html="";

html+="<b>Train:</b> "+selectedTrain+"<br>";
html+="Speed: "+data.speed+" km/h<br>";
html+="Heading: "+data.heading+"°<br>";
html+="Tilt: "+data.tilt+"°<br>";
html+="Status: "+data.status+"<br>";

document.getElementById("trainInfo").innerHTML=html;

}

function toggleRoute(){

showRoute=!showRoute;

if(!showRoute && routeLine){

map.removeLayer(routeLine);
routePoints=[];

}

}

db.ref("trains").on("value",function(snapshot){

let trains=snapshot.val();

for(let id in trains){

let t=trains[id];

let lat=t.lat;
let lng=t.lng;

if(!markers[id]){

let marker=L.circleMarker([lat,lng],{

radius:8,
color:"#000",
weight:2,
fillColor:getColor(t.status),
fillOpacity:0.9

}).addTo(map);

marker.on("click",function(){

selectedTrain=id;
updatePanel(t);

});

markers[id]=marker;

}else{

markers[id].setLatLng([lat,lng]);

markers[id].setStyle({

fillColor:getColor(t.status)

});

}

if(id===selectedTrain){

updatePanel(t);

if(showRoute){

routePoints.push([lat,lng]);

if(routeLine){
map.removeLayer(routeLine);
}

routeLine=L.polyline(routePoints,{
color:"blue",
weight:3
}).addTo(map);

}

}

}

});

</script>

</body>

</html>
