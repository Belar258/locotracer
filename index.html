<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LocoTracer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// CONFIG FIREBASE
var firebaseConfig = {
databaseURL: "https://locotracer-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// MAPA
var map = L.map('map').setView([-25.96, 32.58], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// MARCADORES
var markers = {};

// LER TRENS
db.ref("trains").on("value", function(snapshot){

var trains = snapshot.val();

for(var id in trains){

var train = trains[id];
var lat = train.lat;
var lng = train.lng;
var name = train.name;

if(markers[id]){

markers[id].setLatLng([lat,lng]);

}else{

markers[id] = L.marker([lat,lng])
.addTo(map)
.bindPopup(name);

}

}

});

</script>

</body>
</html>
