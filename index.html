```html
<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>LocoTracer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
position:absolute;
left:250px;
top:0;
right:0;
bottom:0;
}

#panel{
position:absolute;
left:0;
top:0;
bottom:0;
width:250px;
background:#111;
color:white;
padding:20px;
}

.status{
padding:10px;
margin-top:10px;
background:#222;
border-radius:6px;
}

.alert{
background:red;
}

</style>

</head>

<body>

<div id="panel">

<h2>🚆 LocoTracer</h2>

<div class="status">
<b>Comboio:</b> TRAIN01
</div>

<div class="status">
<b>Latitude:</b>
<span id="lat">--</span>
</div>

<div class="status">
<b>Longitude:</b>
<span id="lng">--</span>
</div>

<div class="status">
<b>Estado:</b>
<span id="state">Normal</span>
</div>

<div class="status">
<b>Evento:</b>
<span id="event">Nenhum</span>
</div>

</div>

<div id="map"></div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<script>

// CONFIG FIREBASE
var firebaseConfig = {

 apiKey: "AIzaSyDQ9cMPQOG3TBU-9cB3MH0L4POWp45-Ff4",
  authDomain: "locotracer.firebaseapp.com",
  databaseURL: "https://locotracer-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "locotracer",
  storageBucket: "locotracer.firebasestorage.app",
  messagingSenderId: "364605919766",
  appId: "1:364605919766:web:c50f21644bf289fa29db37",
  measurementId: "G-W0XJFNLHK8"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();


// MAPA

var map = L.map('map').setView([-25.96,32.58],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);


// ICONES

var iconNormal = L.icon({
iconUrl:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
iconSize:[32,32]
});

var iconAlert = L.icon({
iconUrl:"https://maps.google.com/mapfiles/ms/icons/red-dot.png",
iconSize:[32,32]
});


// MARCADOR

var marker = L.marker([-25.96,32.58],{icon:iconNormal}).addTo(map);


// LER FIREBASE

db.ref("trains/TRAIN01").on("value",function(snapshot){

var data = snapshot.val();

if(!data) return;

var lat = data.lat;
var lng = data.lng;
var derail = data.derailment;


// atualizar mapa

marker.setLatLng([lat,lng]);
map.panTo([lat,lng]);


// atualizar painel

document.getElementById("lat").innerHTML = lat.toFixed(6);
document.getElementById("lng").innerHTML = lng.toFixed(6);


// estado

if(derail == true){

marker.setIcon(iconAlert);

document.getElementById("state").innerHTML = "DESCARRILAMENTO";
document.getElementById("state").style.color="red";

var msg = "⚠ DESCARRILAMENTO detectado\n\nCoordenadas:\n"+lat+","+lng;

document.getElementById("event").innerHTML = "Descarrilamento";

alert(msg);

}else{

marker.setIcon(iconNormal);

document.getElementById("state").innerHTML = "Normal";
document.getElementById("state").style.color="lightgreen";

document.getElementById("event").innerHTML = "Nenhum";

}

});

</script>

</body>

</html>
