<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>RailView</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
position:absolute;
left:260px;
top:0;
right:0;
bottom:0;
}

#panel{
position:absolute;
left:0;
top:0;
bottom:0;
width:260px;
background:#111;
color:white;
padding:20px;
}

.info{
margin-top:10px;
padding:8px;
background:#222;
border-radius:5px;
}

.train-icon{
font-size:26px;
}

</style>

</head>

<body>

<div id="panel">

<h2>🚆 RailView</h2>

<div class="info">Comboio: <span id="p_name">---</span></div>
<div class="info">Latitude: <span id="p_lat">---</span></div>
<div class="info">Longitude: <span id="p_lng">---</span></div>
<div class="info">Heading: <span id="p_heading">---</span></div>
<div class="info">Estado: <span id="p_state">---</span></div>

</div>

<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var firebaseConfig = {

  apiKey: "AIzaSyDQ9cMPQOG3TBU-9cB3MH0L4POWp45-Ff4",
  authDomain: "locotracer.firebaseapp.com",
  databaseURL: "https://locotracer-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "locotracer",
  storageBucket: "locotracer.firebasestorage.app",
  messagingSenderId: "364605919766",
  appId: "1:364605919766:web:c50f21644bf289fa29db37",
  measurementId: "G-W0XJFNLHK8"

};

firebase.initializeApp(firebaseConfig);

var db=firebase.database();

var map=L.map('map').setView([-25.96,32.58],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var markers={};

function createTrainIcon(angle,color){

return L.divIcon({

className:'train-icon',

html:`<div style="transform:rotate(${angle}deg);color:${color};">🚆</div>`,

iconSize:[30,30]

});

}

function updatePanel(name,data){

document.getElementById("p_name").innerHTML=name;
document.getElementById("p_lat").innerHTML=data.lat.toFixed(6);
document.getElementById("p_lng").innerHTML=data.lng.toFixed(6);
document.getElementById("p_heading").innerHTML=data.heading.toFixed(1);

if(data.derailment){

document.getElementById("p_state").innerHTML="DESCARRILAMENTO";
document.getElementById("p_state").style.color="red";

}else{

document.getElementById("p_state").innerHTML="NORMAL";
document.getElementById("p_state").style.color="lightgreen";

}

}

db.ref("trains").on("value",function(snapshot){

var trains=snapshot.val();

for(var name in trains){

var data=trains[name];

var pos=[data.lat,data.lng];

var color=data.derailment ? "red":"blue";

var icon=createTrainIcon(data.heading,color);

if(!markers[name]){

var marker=L.marker(pos,{icon:icon}).addTo(map);

marker.bindPopup(
"<b>"+name+"</b><br>"+
"Lat: "+data.lat.toFixed(6)+"<br>"+
"Lng: "+data.lng.toFixed(6)
);

marker.on("click",function(){

var train=this.trainName;

updatePanel(train,trains[train]);

});

marker.trainName=name;

markers[name]=marker;

}

markers[name].setLatLng(pos);

markers[name].setIcon(icon);

markers[name].setPopupContent(
"<b>"+name+"</b><br>"+
"Lat: "+data.lat.toFixed(6)+"<br>"+
"Lng: "+data.lng.toFixed(6)
);

}

});

</script>

</body>

</html>
